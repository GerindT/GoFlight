apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flight-aggregator
  namespace: flight-aggregator
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flight-aggregator
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
