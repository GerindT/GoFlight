apiVersion: v1
kind: ConfigMap
metadata:
  name: flight-aggregator-config
  namespace: flight-aggregator
data:
  PORT: "8080"
  CACHE_TTL: "300"
  LOG_LEVEL: "info"
  AVIATIONSTACK_BASE_URL: "http://api.aviationstack.com/v1"
  OPENWEATHER_BASE_URL: "https://api.open-meteo.com/v1"
  DEFAULT_WEATHER_CITY: "Frankfurt"
  OPENWEATHER_LAT: "50.1109"
  OPENWEATHER_LON: "8.6821"
  FRONTEND_ORIGINS: "http://localhost:5173"
